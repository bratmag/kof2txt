<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>KOF → TXT (v1)</title>

  <!-- Trimble Connect Workspace API (IIFE) -->
  <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>

  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 16px; }
    .card { border: 1px solid #ddd; border-radius: 10px; padding: 14px; max-width: 980px; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    button { padding: 10px 12px; cursor: pointer; }
    input[type="file"] { padding: 8px; }
    .muted { color: #666; font-size: 0.95rem; }
    pre { background: #f7f7f7; padding: 10px; border-radius: 8px; overflow: auto; }
    .ok { color: #0a7a2f; font-weight: 600; }
    .err { color: #b00020; font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <h2>KOF → TXT (v1)</h2>
    <p class="muted">
      Denne extensionen lager <b>.txt</b> (komma-separert) fra <b>.kof</b> for enkel import i Trimble Access.
      Format: <code>punktId,øst,nord,høyde,kode</code>
    </p>

    <div class="row">
      <input id="fileInput" type="file" accept=".kof,.txt" multiple />
      <button id="btnConvert">Konverter og last ned .txt</button>
    </div>

    <p class="muted" style="margin-top:10px;">
      Tips: Hvis en linje bare har 4 felt, settes kode tom (felt 5).
    </p>

    <div id="status" class="muted" style="margin-top:12px;"></div>
    <pre id="preview" style="display:none;"></pre>
  </div>
  <button id="btnConvertProject">Konverter alle .kof i prosjektet</button>

  <script src="app.js"></script>
</body>
</html>
