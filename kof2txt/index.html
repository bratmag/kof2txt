<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>KOFConverter</title>

  <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>

  <style>
    :root {
      --bg: #fafaf8;
      --card: #ffffff;
      --border: #e5e5e2;
      --text: #1a1a1a;
      --muted: #666;
      --accent: #e63946;
      --accent-dark: #c62a37;
      --success: #2a9d5f;
      --warning: #f4a261;
      --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      font-size: 13px;
      line-height: 1.5;
      background: var(--bg);
      color: var(--text);
    }

    #app { padding: 14px; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 12px;
      box-shadow: var(--shadow);
    }

    .status-card {
      position: sticky;
      top: 8px;
      z-index: 20;
      padding: 10px 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12), var(--shadow);
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }

    h2 {
      margin: 0;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .subtitle {
      color: var(--muted);
      font-size: 12px;
      margin: 2px 0 0 0;
    }

    .label {
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
    }

    .project-value {
      font-weight: 500;
      font-size: 13px;
    }

    .btn-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    button {
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--card);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      transition: all 0.15s ease;
      font-family: inherit;
    }

    button:hover:not(:disabled) {
      border-color: var(--accent);
      color: var(--accent);
    }

    button:active:not(:disabled) { transform: translateY(1px); }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    button.primary:hover:not(:disabled) {
      background: var(--accent-dark);
      border-color: var(--accent-dark);
      color: white;
    }

    button.danger {
      background: #8a2b2b;
      border-color: #8a2b2b;
      color: white;
    }

    button.danger:hover:not(:disabled) {
      background: #6f2020;
      border-color: #6f2020;
      color: white;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .file-list {
      margin-top: 10px;
      display: grid;
      gap: 6px;
    }

    .file-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      background: var(--card);
      transition: all 0.12s ease;
    }

    .file-item:hover {
      border-color: #bdbdb8;
      background: #f8f8f5;
    }

    .file-item.selected {
      box-shadow: inset 3px 0 0 #5b8fb8;
    }

    .file-item.converted {
      border-color: #acd9bd;
      background: #f3fbf6;
    }

    .file-item.converted:hover {
      border-color: var(--success);
      background: #eef9f2;
    }

    .file-item.pending {
      border-color: #ead2a5;
      background: #fffaf0;
    }

    .file-item.outdated {
      border-color: #efb27b;
      background: #fff5eb;
    }

    .file-item input[type="radio"],
    .file-item input[type="checkbox"] {
      margin: 0;
      accent-color: #5b8fb8;
    }

    .file-info {
      flex: 1;
      min-width: 0;
    }

    .file-name {
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .file-meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .file-status {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }

    .file-status.converted {
      background: #dff3e8;
      color: #1e6b42;
      border: 1px solid #a8d8bc;
    }

    .file-status.pending {
      background: #fff1d6;
      color: #7a520f;
      border: 1px solid #e8c47c;
    }

    .file-status.outdated {
      background: #ffe5cf;
      color: #8a4d16;
      border: 1px solid #edb37f;
    }

    .status {
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 10px;
      background: #f0f0ec;
      color: var(--text);
      border-left: 3px solid var(--muted);
    }

    .status-card .status {
      margin-bottom: 0;
    }

    .status-card .hint {
      margin-top: 8px;
    }

    .status.success {
      background: #e8f5ee;
      color: #1e6b42;
      border-left-color: var(--success);
    }

    .status.error {
      background: #fdecec;
      color: #8a2b2b;
      border-left-color: var(--accent);
    }

    .status.working {
      background: #fef3e7;
      color: #8a5a1e;
      border-left-color: var(--warning);
    }

    .hint {
      padding: 10px 12px;
      background: #f0f4f8;
      border-radius: 6px;
      font-size: 12px;
      color: #345;
      margin-top: 10px;
      border-left: 3px solid #5b8fb8;
    }

    .hint-icon { margin-right: 6px; }

    .empty-state {
      padding: 20px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
    }

    details.debug {
      margin-top: 10px;
    }

    details.debug summary {
      font-size: 11px;
      color: var(--muted);
      cursor: pointer;
      padding: 4px 0;
      user-select: none;
    }

    details.debug summary:hover { color: var(--text); }

    details.debug pre {
      background: #1a1a1a;
      color: #d4d4d4;
      padding: 10px;
      border-radius: 6px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 10px;
      line-height: 1.4;
      max-height: 300px;
      overflow: auto;
      margin: 6px 0 0 0;
    }

    .badge {
      display: inline-block;
      padding: 2px 7px;
      background: #f0f0ec;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .file-count { color: var(--muted); font-size: 11px; font-weight: 500; }

    .embed-card {
      padding-bottom: 10px;
    }

    .embed-meta {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 10px;
      line-height: 1.6;
    }

    .explorer-frame {
      width: 100%;
      min-height: 520px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fff;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 10px 0;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="app.js?v=20260513-prod-ux-restore"></script>
</body>
</html>
