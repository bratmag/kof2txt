<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>KOF DEBUG</title>

  <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      font-size: 13px;
      background: #ffffff;
      color: #222;
    }

    #app {
      padding: 12px;
      box-sizing: border-box;
    }

    .card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .muted {
      color: #666;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 4px;
    }

    input[type="text"] {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      border: 1px solid #bbb;
      border-radius: 6px;
      font-size: 13px;
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    button {
      padding: 10px 14px;
      border: 1px solid #999;
      border-radius: 6px;
      background: #f5f5f5;
      cursor: pointer;
      font-size: 13px;
    }

    button:hover {
      background: #ececec;
    }

    #statusBox {
      background: #eef5ff;
      border: 1px solid #cddff7;
      border-radius: 6px;
      padding: 8px;
      margin-bottom: 12px;
      font-weight: bold;
    }

    #output {
      background: #111;
      color: #eaeaea;
      padding: 10px;
      border-radius: 6px;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 180px;
      max-height: 420px;
      overflow: auto;
      font-size: 11px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="app.js"></script>
</body>
</html>
